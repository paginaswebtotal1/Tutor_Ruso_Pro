<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Ruso Pro - David Salazar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-lg w-full bg-[#1e293b] p-8 rounded-[2.5rem] shadow-2xl border border-slate-700/50 text-center">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6 italic">Tutor Ruso Pro</h1>
        <textarea id="userInput" rows="3" placeholder="Escribe o habla..." class="w-full p-5 rounded-3xl bg-[#0f172a] border border-slate-600 text-white text-lg focus:outline-none mb-4"></textarea>
        <div class="flex gap-2">
            <button id="btnMic" onclick="toggleEscucha()" class="p-5 bg-slate-700 rounded-3xl"><i class="fas fa-microphone text-2xl"></i></button>
            <button id="btnProcesar" onclick="hablarConAgente()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-5 rounded-3xl shadow-xl uppercase">Enviar al Agente</button>
        </div>
        <div id="resultado" class="mt-8 p-6 bg-[#0f172a]/50 rounded-3xl hidden border border-slate-700/50">
            <div class="flex justify-between mb-4">
                <button id="btnStop" onclick="detenerVoz()" class="hidden text-red-400 font-bold bg-red-900/20 px-4 py-1 rounded-full border border-red-800">DETENER</button>
                <button onclick="repetirVoz()" class="text-slate-400"><i class="fas fa-volume-up text-xl"></i></button>
            </div>
            <div id="respuestaIA" class="text-lg text-left italic leading-relaxed"></div>
        </div>
    </div>
    <script>
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        let ultimaRespuesta = "";
        if(recognition) {
            recognition.lang = 'es-ES';
            recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; toggleEscucha(); hablarConAgente(); };
        }
        function toggleEscucha() {
            const icon = document.querySelector('#btnMic i');
            if (icon.classList.contains('text-red-500')) { recognition.stop(); icon.classList.remove('text-red-500'); }
            else { recognition.start(); icon.classList.add('text-red-500'); }
        }
        async function hablarConAgente() {
            const input = document.getElementById('userInput').value;
            if(!input) return;
            detenerVoz();
            const response = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ prompt: input }) });
            const data = await response.json();
            ultimaRespuesta = data.response;
            document.getElementById('respuestaIA').innerText = ultimaRespuesta;
            document.getElementById('resultado').classList.remove('hidden');
            repetirVoz();
        }
        function repetirVoz() {
            window.speechSynthesis.cancel();
            const textoLimpio = ultimaRespuesta.replace(/[*#_]/g, '');
            const msg = new SpeechSynthesisUtterance(textoLimpio);
            msg.lang = /[а-яА-Я]/.test(textoLimpio) ? 'ru-RU' : 'es-ES';
            msg.rate = 0.95;
            msg.onstart = () => document.getElementById('btnStop').classList.remove('hidden');
            msg.onend = () => document.getElementById('btnStop').classList.add('hidden');
            window.speechSynthesis.speak(msg);
        }
        function detenerVoz() { window.speechSynthesis.cancel(); document.getElementById('btnStop').classList.add('hidden'); }
    </script>
</body>
</html>
