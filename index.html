<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Ruso Pro - Agente IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 text-center">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">🇷🇺 Tutor Ruso Pro</h1>
        <p class="text-slate-400 mb-6 text-sm italic">Agente Inteligente en Cloudflare</p>
        
        <textarea id="userInput" rows="3" placeholder="Ej: Enséñame el alfabeto ruso..." 
            class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:border-blue-500 text-white mb-4 transition-all"></textarea>
        
        <button id="btnProcesar" onclick="hablarConAgente()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all transform active:scale-95 shadow-lg shadow-blue-900/30">
            Preguntar al Agente
        </button>

        <div id="resultado" class="mt-6 p-4 bg-slate-950 rounded-xl hidden text-left border border-slate-700 max-h-60 overflow-y-auto">
            <div id="respuestaIA" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        async function hablarConAgente() {
            const input = document.getElementById('userInput').value;
            const respIA = document.getElementById('respuestaIA');
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnProcesar');

            if(!input) return alert('David, escribe tu pregunta primero');

            // Estado de carga
            btn.disabled = true;
            btn.innerText = "Pensando...";
            respIA.innerText = "Consultando a Llama 3...";
            resDiv.classList.remove('hidden');

            try {
                // LLAMADA REAL A TU WORKER
                const response = await fetch("https://tutor-ruso-api.paginaswebtotal1.workers.dev/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input })
                });
                
                const data = await response.json();
                
                if(data.response) {
                    respIA.innerText = data.response;
                    
                    // Voz: Lee la respuesta
                    const msg = new SpeechSynthesisUtterance(data.response.substring(0, 200));
                    msg.lang = 'ru-RU';
                    window.speechSynthesis.speak(msg);
                } else {
                    respIA.innerText = "Error: El Worker no devolvió respuesta. Revisa los logs.";
                }
            } catch (e) {
                respIA.innerText = "Error de conexión. Asegúrate de que el Worker esté activo.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Preguntar al Agente";
            }
        }
    </script>
</body>
</html>
