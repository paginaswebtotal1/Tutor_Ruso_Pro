<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor de Ruso Pro - IA Interactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .mic-active { animation: pulse-red 1.5s infinite; color: #ef4444 !important; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-lg w-full bg-[#1e293b] p-8 rounded-[2.5rem] shadow-2xl border border-slate-700/50 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>
        
        <div class="text-center mb-8 relative">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Tutor Ruso Pro
            </h1>
            <p class="text-slate-400 mt-2 font-medium tracking-wide">DAVID SALAZAR EDITION</p>
        </div>
        
        <div class="space-y-6 relative">
            <div class="relative">
                <textarea id="userInput" rows="3" 
                    placeholder="Escribe o pulsa el micro para hablar..." 
                    class="w-full p-5 pr-14 rounded-3xl bg-[#0f172a] border border-slate-600 focus:ring-2 focus:ring-blue-500 focus:outline-none text-white placeholder-slate-500 transition-all resize-none text-lg"></textarea>
                
                <button id="btnMic" onclick="toggleEscucha()" 
                    class="absolute right-4 top-5 text-slate-400 hover:text-blue-400 transition-colors">
                    <i class="fas fa-microphone text-2xl"></i>
                </button>
            </div>
            
            <button id="btnProcesar" onclick="hablarConAgente()" 
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-5 rounded-3xl transition-all transform active:scale-95 shadow-xl flex items-center justify-center gap-3 text-lg">
                <i class="fas fa-paper-plane"></i>
                <span>Enviar al Agente</span>
            </button>
        </div>

        <div id="resultado" class="mt-8 p-6 bg-[#0f172a]/50 rounded-3xl hidden border border-slate-700/50 backdrop-blur-sm">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-blue-400 uppercase tracking-widest">Respuesta del Tutor</span>
                <button onclick="repetirVoz()" class="text-slate-400 hover:text-white"><i class="fas fa-volume-up"></i></button>
            </div>
            <div id="respuestaIA" class="text-slate-200 leading-relaxed text-lg italic"></div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE VOZ (ESCUCHA) ---
        const recognition = window.SpeechRecognition || window.webkitSpeechRecognition ? new (window.SpeechRecognition || window.webkitSpeechRecognition)() : null;
        if(recognition) {
            recognition.lang = 'es-ES';
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('userInput').value = transcript;
                toggleEscucha();
            };
        }

        function toggleEscucha() {
            const micIcon = document.querySelector('#btnMic i');
            if (micIcon.classList.contains('mic-active')) {
                recognition.stop();
                micIcon.classList.remove('mic-active');
            } else {
                if(!recognition) return alert("Tu navegador no soporta reconocimiento de voz.");
                recognition.start();
                micIcon.classList.add('mic-active');
            }
        }

        // --- INTERACCIÓN CON EL AGENTE ---
        let ultimaRespuesta = "";

        async function hablarConAgente() {
            const input = document.getElementById('userInput').value;
            const respIA = document.getElementById('respuestaIA');
            const resDiv = document.getElementById('resultado');
            const btn = document.getElementById('btnProcesar');

            if(!input) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> <span>Procesando...</span>';
            
            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ prompt: input })
                });
                
                const data = await response.json();
                
                if(data.response) {
                    ultimaRespuesta = data.response;
                    respIA.innerText = ultimaRespuesta;
                    resDiv.classList.remove('hidden');
                    
                    // Hablar automáticamente
                    repetirVoz();
                }
            } catch (e) {
                respIA.innerText = "Error: " + e.message;
                resDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> <span>Enviar al Agente</span>';
            }
        }

        function repetirVoz() {
            if(!ultimaRespuesta) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(ultimaRespuesta);
            
            // Detecta si hay cirílico para usar voz rusa, si no, usa española
            msg.lang = /[а-яА-Я]/.test(ultimaRespuesta) ? 'ru-RU' : 'es-ES';
            msg.rate = 0.9; 
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
